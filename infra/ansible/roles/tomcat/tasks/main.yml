---
# roles/tomcat/tasks/main.yml
# Runs Tomcat 11 in Docker on app-server
# Idempotent — safe to run multiple times

- name: Create Tomcat volume for WAR deployments
  docker_volume:
    name: tomcat_volume     # persists deployed WARs across container restarts

- name: Run Tomcat 11 container
  docker_container:
    name: tomcat
    image: tomcat:11        # latest Tomcat 11 LTS
    state: started
    restart_policy: always  # restarts on VM reboot or container crash
    volumes:
      - tomcat_volume:/usr/local/tomcat/webapps   # WARs deployed here
    ports:
      - "8080:8080"         # expose Tomcat's default HTTP port
